name: FR Coverage
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

on: [pull_request]

permissions:
  contents: read

jobs:
  coverage:
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v4.1.1
      - uses: dtolnay/rust-toolchain@29eef336d9b2848a0b548edc03f92a220660cdb8 # v1
        with: { toolchain: stable }
      - run: |
          if [ ! -f tooling/fr-coverage ]; then
            mkdir -p tooling
            if [ -d phenotype-tooling ]; then
              cd phenotype-tooling && cargo build --release --bin fr-coverage 2>&1 | tail -5
              ln -sf ../phenotype-tooling/target/release/fr-coverage ../tooling/
            else
              echo "Note: fr-coverage not available; skipping" && exit 0
            fi
          fi
          tooling/fr-coverage --pr || true
