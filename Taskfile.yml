version: "3"

vars:
  REPO_LANG:
    sh: |
      if [ -f go.mod ]; then
        echo go
      elif [ -f Cargo.toml ]; then
        echo rust
      elif [ -f pyproject.toml ] || [ -f requirements.txt ] || [ -f setup.py ]; then
        echo python
      elif [ -f package.json ]; then
        echo node
      else
        echo unknown
      fi
  NODE_PM:
    sh: |
      if [ -f bun.lockb ] || [ -f bun.lock ]; then
        echo bun
      elif [ -f pnpm-lock.yaml ]; then
        echo pnpm
      elif [ -f yarn.lock ]; then
        echo yarn
      else
        echo npm
      fi
  NODE_RUN:
    sh: |
      case "{{.NODE_PM}}" in
        bun) echo "bun run" ;;
        pnpm) echo "pnpm run" ;;
        yarn) echo "yarn" ;;
        npm) echo "npm run" ;;
      esac
  NODE_INSTALL:
    sh: |
      case "{{.NODE_PM}}" in
        bun) echo "bun install" ;;
        pnpm) echo "pnpm install" ;;
        yarn) echo "yarn install" ;;
        npm) echo "npm install --no-package-lock --no-audit --no-fund" ;;
      esac
  NODE_PRETTIER:
    sh: |
      case "{{.NODE_PM}}" in
        bun) echo "bunx --yes prettier" ;;
        pnpm) echo "pnpm dlx prettier" ;;
        yarn) echo "yarn dlx prettier" ;;
        npm) echo "npx --yes prettier" ;;
      esac

tasks:
  default:
    desc: List available tasks
    cmds:
      - task --list

  ensure-node-deps:
    internal: true
    cmds:
      - cmd: |
          set -eu
          if [ "{{.REPO_LANG}}" != "node" ]; then
            exit 0
          fi

          ready="node_modules/.task-deps-ready"
          if [ -f "$ready" ]; then
            exit 0
          fi

          mkdir -p .task
          lock=".task/node-install.lock"
          waited=0
          while ! mkdir "$lock" 2>/dev/null; do
            if [ -f "$ready" ]; then
              exit 0
            fi
            if [ "$waited" -ge 120 ]; then
              echo "Timed out waiting for Node dependency installation lock" >&2
              exit 1
            fi
            sleep 1
            waited=$((waited + 1))
          done
          trap 'rmdir "$lock" 2>/dev/null || true' EXIT

          status=0
          if [ ! -f "$ready" ]; then
            {{.NODE_INSTALL}} || status=$?
            if [ "$status" -eq 0 ]; then
              touch "$ready"
            fi
          fi

          exit "$status"

  build:
    desc: Build the repository using the detected language toolchain
    deps:
      - ensure-node-deps
    cmds:
      - cmd: |
          set -eu
          case "{{.REPO_LANG}}" in
            node)
              {{.NODE_RUN}} docs:build
              ;;
            python)
              if [ -f pyproject.toml ]; then
                uv run python -m build
              else
                python -m compileall .
              fi
              ;;
            go)
              go build ./...
              ;;
            rust)
              cargo build --all-targets
              ;;
            *)
              echo "Unsupported repository language: {{.REPO_LANG}}" >&2
              exit 1
              ;;
          esac

  test:
    desc: Run the repository test suite using the detected language toolchain
    deps:
      - ensure-node-deps
    cmds:
      - cmd: |
          set -eu
          case "{{.REPO_LANG}}" in
            node)
              {{.NODE_RUN}} test
              ;;
            python)
              uv run pytest
              ;;
            go)
              go test ./...
              ;;
            rust)
              cargo test
              ;;
            *)
              echo "Unsupported repository language: {{.REPO_LANG}}" >&2
              exit 1
              ;;
          esac

  lint:
    desc: Run lint checks using the detected language toolchain
    deps:
      - ensure-node-deps
    cmds:
      - cmd: |
          set -eu
          case "{{.REPO_LANG}}" in
            node)
              if node -e 'process.exit(require("./package.json").scripts?.lint ? 0 : 1)'; then
                {{.NODE_RUN}} lint
              else
                files="Taskfile.yml package.json mkdocs.yml vitest.config.ts README.md docs/guides/tooling.md"
                existing=""
                for file in $files; do
                  if [ -f "$file" ]; then
                    existing="$existing $file"
                  fi
                done

                if [ -z "$existing" ]; then
                  echo "No lintable files found"
                  exit 0
                fi

                {{.NODE_PRETTIER}} --check $existing
              fi
              ;;
            python)
              uv run ruff check .
              ;;
            go)
              go vet ./...
              ;;
            rust)
              cargo fmt --check && cargo clippy --all-targets --all-features -- -D warnings
              ;;
            *)
              echo "Unsupported repository language: {{.REPO_LANG}}" >&2
              exit 1
              ;;
          esac

  clean:
    desc: Remove generated build, test, and cache artifacts
    cmds:
      - rm -rf node_modules docs/.vitepress/dist docs/.vitepress/cache \
        docs/.vitepress/.temp coverage .turbo .task .pytest_cache .ruff_cache \
        dist build target *.tsbuildinfo
